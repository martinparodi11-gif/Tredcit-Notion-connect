# Coloca este archivo en tu repo en la ruta:  .github/workflows/daily-training-summary.yml
name: Resumen diario de entrenamiento

on:
  schedule:
    # 11:00 UTC = 06:00 America/Lima (UTC-5). GitHub usa SIEMPRE UTC.
    # Puede retrasarse 10-30 min en horas pico (normal en GitHub Actions).
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # permite ejecutarlo a mano desde la pestaña Actions

# Solo lectura: este workflow NO escribe en el repo (sin keepalive),
# así evitamos cualquier bloqueo de acceso de escritura al repositorio.
permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Ejecutar resumen Tredict -> Notion
        env:
          TREDICT_TOKEN: ${{ secrets.TREDICT_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python tredict_to_notion.py

# Nota: quité el paso "keepalive" (que evitaba el apagado del cron a los 60 días)
# porque era lo único que requería acceso de escritura al repo. Una vez que la
# cuenta quede desbloqueada, lo volvemos a agregar, o basta con que hagas
# cualquier commit en el repo cada <60 días.
